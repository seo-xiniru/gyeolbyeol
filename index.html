<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>訣別</title>
  <style>
    @font-face {
      font-family: 'MaruBuri';
      src: url(https://hangeul.pstatic.net/hangeul_static/webfont/MaruBuri/MaruBuri-Regular.woff2) format("woff2"),
           url(https://hangeul.pstatic.net/hangeul_static/webfont/MaruBuri/MaruBuri-Regular.woff) format("woff"),
           url(https://hangeul.pstatic.net/hangeul_static/webfont/MaruBuri/MaruBuri-Regular.ttf) format("truetype");
    }
    @font-face {
      font-family: 'SeoulHangangM';
      src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/SeoulHangangM.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'ChosunKm';
      src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/ChosunKm.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }

    html, body, .btn, .container {
      font-family: 'MaruBuri', sans-serif;
      margin: 0;
      padding: 0;
      height: 100%;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(to bottom, rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0)),
        url('zimg/broken.jpg');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      background-attachment: fixed;
      opacity: 0.8;
      z-index: -1;
    }


    header, footer {
      text-align: center;
      color: white;
    }

    h1 {
      margin: 0;
    }

    .wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(6, 150px);
      grid-template-rows: repeat(2, 150px);
      gap: 0;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #000;
      font-size: 16px;
      border: 0px solid #999;
      width: 150px;
      height: 150px;
    }

    .btn img {
      max-width: 100%;
      max-height: 100%;
      object-fit: cover;
    }

    .main-hanja {
      font-family: 'ChosunKm', serif;
      display: inline-block;
      background-color: black;
    }

    .text-bg {
      background-color: black;
      padding: 7px 10px;
      display: inline;
    }

    .shadow {
      text-shadow: 3px 3px 3px rgba(0, 0, 0, 0.3);
    }

    .b1 { grid-column: 1 / 6; grid-row: 1 / 2; }
    .b2 { grid-column: 1 / 6; grid-row: 2 / 2; }
    .b3 { grid-column: 2 / 6; grid-row: 2 / 2; }
    .b4 { grid-column: 6 / 6; grid-row: 1 / 2; }
    .b5 { grid-column: 3 / 6; grid-row: 1 / 2; }
    .b6 { grid-column: 4 / 6; grid-row: 1 / 2; }
    .b7 { grid-column: 4 / 6; grid-row: 2 / 2; }
    .b8 { grid-column: 5 / 6; grid-row: 2 / 2; }
    .b9 { grid-column: 6 / 6; grid-row: 2 / 2; }

    .btn.b1,
    .btn.b5,
    .btn.b8,
    .btn.b11{
      pointer-events: none;
      cursor: default;
    }

    .b11 { grid-column: 1 / 6; grid-row: 1 / 2; }
    .b22{ grid-column: 1 / 6; grid-row: 2 / 2; }
    .b33 { grid-column: 2 / 6; grid-row: 1 / 2; }
    .b44 { grid-column: 6 / 6; grid-row: 1 / 2; }
    .b55 { grid-column: 3 / 6; grid-row: 1 / 2; }
    .b66 { grid-column: 3 / 6; grid-row: 2 / 2; }
    .b77 { grid-column: 4 / 6; grid-row: 2 / 2; }
    .b88 { grid-column: 5 / 6; grid-row: 2 / 2; }
    .b99 { grid-column: 6 / 6; grid-row: 2 / 2; }
    .b10 { grid-column: 4 / 6; grid-row: 1 / 2; }

    footer {
      background-color: rgba(0, 0, 0, 0.7); /* 어두운 반투명 배경 */
      color: #fff;
      padding: 20px 0;
      font-size: 14px;
      text-align: center;
      position: relative;
      bottom: 0;
      width: 100%;
    }

    footer a {
      color: #ccc;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }


  </style>
</head>
<body>
  <header class="bg-main" style="padding-top: 100px; padding-bottom: 50px;">
    <h1 class="main-hanja" style="padding: 15px 30px; font-size: 9rem;">訣別</h1>
    <h2 class="shadow"><span class="text-bg">누군가와의 결별, 무언가와의 결별, 나와의 결별</span></h2>
    <div style="line-height: 100%;">
      <p class="shadow" style="padding-top: 20px;">
        <span class="text-bg">당신은 결별이 무엇인지 아시나요? 그렇다면 결별은 당신에게 어떤 의미인가요.</span>
      <p><span class="text-bg">과거의 결별에 대한 작품들은 '헤어짐'을 어떻게 표현하는지 느껴보며 자신만의 의미를 발견해봅시다.</span></p>
    </div>
    </p>
  </header>
  <section style="padding-top: 50px;">
    <div class="wrapper">
      <main class="container">
        <a href="#" class="btn b1"><img src="zimg/poem.png" alt="버튼1"></a>
        <a href="page/flower.html" class="btn b2"><img src="zimg/back.png" alt="버튼2"></a>
        <a href="page/love.html" class="btn b3"><img src="zimg/mak.png" alt="버튼3"></a>
        <a href="#" class="btn b5"><img src="zimg/black.png" alt="버튼5"></a>
        <a href="page/btn6.html" class="btn b6"><img src="zimg/black.png" alt="버튼6"></a>
        <a href="page/btn7.html" class="btn b7"><img src="zimg/black.png" alt="버튼7"></a>
        <a href="#" class="btn b8"><img src="zimg/black.png" alt="버튼8"></a>
        <a href="page4.html" class="btn b4"><img src="zimg/black.png" alt="버튼4"></a>
        <a href="page9.html" class="btn b9"><img src="zimg/black.png" alt="버튼9"></a>
      </main>
    </div>
  </section>
  <section style="padding-bottom: 100px;">
    <div class="wrapper">
      <main class="container">
        <a href="#" class="btn b11"><img src="zimg/music.png" alt="버튼11"></a>
        <a href="page/spring.html" class="btn b22"><img src="zimg/fallen.jpg" alt="버튼22"></a>
        <a href="page/flowerwork.html" class="btn b33"><img src="zimg/yellow.jpg" alt="버튼33"></a>
        <a href="#" class="btn b55"><img src="zimg/black.png" alt="버튼55"></a>
        <a href="page/spring.html" class="btn b66"><img src="zimg/black.png" alt="버튼66"></a>
        <a href="page/flowerwork.html" class="btn b77"><img src="zimg/black.png" alt="버튼77"></a>
        <a href="#" class="btn b8"><img src="zimg/black.png" alt="버튼88"></a>
        <a href="page4.html" class="btn b44"><img src="zimg/black.png" alt="버튼44"></a>
        <a href="page9.html" class="btn b99"><img src="zimg/black.png" alt="버튼99"></a>
        <a href="page9.html" class="btn b10"><img src="zimg/black.png" alt="버튼10"></a>
      </main>
    </div>
  </section>
  <footer style="padding: 50px 0px;">
    <div class="footer-content">
      <p>&copy; 2025 訣別, 결별. All rights reserved.</p>
      <p>문의: <a href="mailto:contact@gyeolbyeol.com">contact@gyeolbyeol.com</a></p>
    </div>
  </footer>

</body>
</html>
