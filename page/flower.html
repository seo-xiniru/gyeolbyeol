<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>낙화, 이형기</title>
  <style type="text/css">
    @font-face {
      font-family: 'MaruBuri';
      src: url(https://hangeul.pstatic.net/hangeul_static/webfont/MaruBuri/MaruBuri-Regular.woff2) format("woff2"),
           url(https://hangeul.pstatic.net/hangeul_static/webfont/MaruBuri/MaruBuri-Regular.woff) format("woff"),
           url(https://hangeul.pstatic.net/hangeul_static/webfont/MaruBuri/MaruBuri-Regular.ttf) format("truetype");}
    @font-face {
      font-family: 'SeoulHangangM';
      src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/SeoulHangangM.woff') format('woff');
      font-weight: normal;
      font-style: normal;}
    @font-face {
      font-family: 'ChosunKm';
      src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/ChosunKm.woff') format('woff');
      font-weight: normal;
      font-style: normal;}

    html {
      font-family: 'MaruBuri', sans-serif;
      margin: 0;
      padding: 0;
      height: 100%;
      line-height: 160%;
      text-align: center;
      color: black;}

    section {padding-top: 100px;}

    .wrap {
      width: 1000px;
      margin: auto;}

    .background {
      background-color: #white;}

    .falling {
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      padding: 500px 0;
      position: relative;
      width: 100vw;
      left: 50%;
      transform: translateX(-50%);
      overflow: hidden;

      /* 초기엔 배경 비움 (스크롤로 넣을 예정) */
      background-image: none;}

    .falling::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #ffffff 0%, transparent 15%, transparent 85%, #ffffff 100%);
      pointer-events: none;}

      .back-button {
        position: fixed;
        top: 10px;
        right: 10px;
        background: rgba(0,0,0,0.6);
        color: white;
        padding: 8px 12px;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
        text-decoration: none;
        z-index: 1000;
        user-select: none;
      }
      .back-button:hover {
        background: rgba(0,0,0,0.8);
      }
  </style>
</head>
<header>
  <a href="../index.html" class="back-button">뒤로가기</a>
  <p style="padding-top: 50px">낙화, 이형기</p>
</header>
<body class="background">
  <div class="wrap">
    <section>
      <p>가야 할 때가 언제인가를</p>
      <p>분명히 알고 가는 이의</p>
      <p>뒷모습은 얼마나 아름다운가</p>
    </section>
    <section>
      <p>봄 한철</p>
      <p>격정을 인내한</p>
      <p>나의 사랑은 지고 있다</p>
    </section>
    <section>
      <p class="falling">분분한 낙화</p>
      <p style="padding-top: 100px;">결별이 이룩하는 축복에 싸여</p>
      <p>지금은 가야 할 때</p>
    </section>
    <section>
      <p>무성한 녹음과 그리고</p>
      <p>머지않아 열매 맺는</p>
      <p>가을을 향하여</p>
      <p>나의 청춘은 꽃답게 죽는다</p>
    </section>
    <section>
      <p>헤어지자</p>
      <p>섬세한 손길을 흔들며</p>
      <p>하롱하롱 꽃잎이 지는 어느 날</p>
    </section>
    <section style="padding-bottom: 200px;">
      <p>나의 사랑, 나의 결별</p>
      <p>샘터에 물 고이듯 성숙하는</p>
      <p>내 영혼의 슬픈 눈</p>
    </section>
  </div>

  <!-- ✅ 스크롤 시 GIF 재생 스크립트 -->
  <script>
    window.addEventListener('scroll', function () {
      const fallingEl = document.querySelector('.falling');
      const rect = fallingEl.getBoundingClientRect();

      if (rect.top < window.innerHeight && rect.bottom > 0) {
        // 화면에 들어왔을 때만 GIF 적용
        fallingEl.style.backgroundImage = "url('../falling.gif')";
      } else {
        // 나가면 제거하여 다시 진입 시 처음부터 재생
        fallingEl.style.backgroundImage = "none";
      }
    });
  </script>
</body>
</html>
